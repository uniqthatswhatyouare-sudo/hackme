<!DOCTYPE html>
<html>
<head>
<title>Level 2</title>

<style>
body {
  background: black;
  color: lime;
  font-family: monospace;
  text-align: center;
  padding-top: 50px;
}

#msg {
  white-space: pre-line;
  font-size: 18px;
  width: 80%;
  margin: auto;
}
input, button {
  margin-top: 10px;
  padding: 8px;
  font-family: monospace;
}
</style>
</head>

<body>

<h1>TRANSMISSION INTERCEPTED</h1>

<div id="msg"></div>

<script>
let msg = document.getElementById("msg");

// STEP 1 — show base64
msg.innerHTML = "Connecting to encrypted signal...\n";
msg.innerHTML += "Signal acquired.\n\n";
msg.innerHTML += "Decoding base64 payload...\n\n";

setTimeout(() => {

  msg.innerHTML += "R29vZC4gVGhlIG1lc3NhZ2UgaXMgaW5jb21wbGV0ZS4=\n";

}, 1500);

// STEP 2 — decoding effect
setTimeout(() => {

  msg.innerHTML += "\nDecoding complete...\n";

}, 3000);

// STEP 3 — decoded message appears
setTimeout(() => {

  msg.innerHTML += `
Good. The message is incomplete.
`;

}, 4500);

// STEP 4 — secondary encryption
setTimeout(() => {

  msg.innerHTML += `
Secondary encryption detected.
ROT-7 REQUIRED.
`;

}, 6500);

// STEP 5 — encrypted key appears
setTimeout(() => {

  msg.innerHTML += `
Encrypted key detected: psveffvu
`;

}, 8500);

// STEP 6 — input box
setTimeout(() => {

  msg.innerHTML += `

ENTER DECRYPTED KEY:
`;

  msg.innerHTML += `
<input id="answer" type="text">
<button onclick="check()">Submit</button>
`;

}, 10500);

// CHECK ANSWER
function check() {
  let input = document.getElementById("answer").value.toLowerCase();

  if (input === "iloveyou") {
    window.location.href = "level3.html";
  } else {
    alert("ACCESS DENIED");
  }
}
</script>

</body>
</html>
